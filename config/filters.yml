# ─── Relevance Filtering Keywords ───────────────────────────────────────────
# positive: keywords that indicate defense / geopolitics / strategic relevance
# negative: keywords that indicate noise (entertainment, sports, lifestyle)
#
# Scoring:  +1 per positive hit  ·  -1 per negative hit  ·  small tier bonus
# Articles below min_score are dropped.

min_score: 1

# Topic categories used for user-controlled selection in CLI.
# Exactly one category is assigned per article based on strongest keyword hits.
topic_keywords:
  defense:
    - missile
    - drone
    - strike
    - airstrike
    - bombing
    - artillery
    - warship
    - submarine
    - fighter jet
    - military
    - defense
    - defence
    - army
    - navy
    - air force
    - troops
    - soldiers
    - weapons
    - ammunition
    - radar
    - surveillance
    - intelligence

  economy:
    - economy
    - economic
    - inflation
    - gdp
    - growth
    - trade
    - tariff
    - sanctions
    - embargo
    - supply chain
    - critical minerals
    - rare earth
    - crude oil
    - oil price

  technology:
    - cybersecurity
    - cyber attack
    - semiconductor
    - ai
    - artificial intelligence
    - satellite
    - isro
    - drdo
    - espionage

  diplomacy:
    - diplomacy
    - diplomatic
    - treaty
    - alliance
    - bilateral
    - multilateral
    - summit
    - foreign policy
    - ambassador
    - envoy
    - sovereignty
    - territorial dispute

  science:
    - nuclear
    - reactor
    - space
    - launch
    - satellite
    - climate
    - arctic

  energy:
    - oil
    - gas
    - lng
    - strait of hormuz
    - energy security
    - refinery
    - crude
    - pipeline

  global_policy:
    - geopolitics
    - nato
    - quad
    - brics
    - sco
    - middle east
    - indo-pacific
    - south china sea
    - global order
    - sanctions

